<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verba - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#4d44e3",
                        "inverse-surface": "#213145",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "inverse-primary": "#c3c0ff",
                        "surface": "#f8f9ff",
                        "surface-container-high": "#dce9ff",
                        "outline-variant": "#c7c4d8",
                        "on-tertiary-fixed": "#001f26",
                        "secondary-fixed": "#d8e2ff",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#3323cc",
                        "secondary": "#0058be",
                        "on-surface-variant": "#464555",
                        "on-error": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "secondary-container": "#2170e4",
                        "surface-dim": "#cbdbf5",
                        "outline": "#777587",
                        "primary-fixed-dim": "#c3c0ff",
                        "primary-container": "#4f46e5",
                        "tertiary": "#00505f",
                        "tertiary-fixed": "#acedff",
                        "primary-fixed": "#e2dfff",
                        "on-surface": "#0b1c30",
                        "surface-container-highest": "#d3e4fe",
                        "on-primary-fixed": "#0f0069",
                        "surface-container-low": "#eff4ff",
                        "surface-container": "#e5eeff",
                        "on-background": "#0b1c30",
                        "tertiary-container": "#006a7c",
                        "on-tertiary": "#ffffff",
                        "on-primary-container": "#dad7ff",
                        "primary": "#3525cd",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-bright": "#f8f9ff",
                        "on-secondary-container": "#fefcff",
                        "on-secondary-fixed-variant": "#004395",
                        "error-container": "#ffdad6",
                        "on-tertiary-container": "#93e8ff",
                        "on-secondary-fixed": "#001a42",
                        "on-error-container": "#93000a",
                        "background": "#f8f9ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "container-padding": "24px",
                        "stack-lg": "32px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "definition-body": ["Inter"],
                        "button-text": ["Inter"],
                        "section-heading": ["Inter"],
                        "label-caps": ["Inter"],
                        "display-word": ["Inter"],
                        "caption": ["Inter"],
                        "display-word-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "definition-body": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "button-text": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "section-heading": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display-word": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "caption": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "display-word-mobile": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #f8f9ff;
            color: #0b1c30;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(79, 70, 229, 0.08);
        }
        @keyframes cloud-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes arrow-down {
            0% { transform: translateY(-20px); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(20px); opacity: 0; }
        }
        .animate-float { animation: cloud-float 4s ease-in-out infinite; }
        .animate-download { animation: arrow-down 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-definition-body flex flex-col min-h-screen">
<!-- Header Suppression: As this is a transactional onboarding screen, the TopAppBar/BottomNavBar are suppressed. -->
<main class="flex-grow flex flex-col items-center justify-center px-container-padding relative">
<!-- Background Atmospheric Element -->
<div class="absolute inset-0 z-0 opacity-30">

</div>
<div class="z-10 w-full max-w-md flex flex-col items-center text-center">
<!-- Visual Indicator Section -->
<div class="relative w-64 h-64 mb-stack-lg flex items-center justify-center">
<!-- Outer Ring Glow -->
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<!-- The Visual: Cloud-to-Device -->
<div class="relative flex flex-col items-center">
<!-- Cloud -->
<div class="animate-float">
<span class="material-symbols-outlined text-[80px] text-primary" style="font-variation-settings: 'FILL' 1;">cloud</span>
</div>
<!-- Download Indicator -->
<div class="h-16 flex flex-col items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-secondary animate-download">arrow_downward</span>
</div>
<!-- Device/Library Icon -->
<div class="relative">
<span class="material-symbols-outlined text-[96px] text-primary-container" style="font-variation-settings: 'FILL' 1;">tablet_android</span>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/3 flex flex-col items-center">
<span class="material-symbols-outlined text-on-primary-container text-3xl">menu_book</span>
</div>
</div>
</div>
</div>
<!-- Typography Content -->
<h1 class="font-section-heading text-section-heading-mobile mb-stack-md text-on-surface">Learn Anywhere</h1>
<p class="font-definition-body text-on-surface-variant max-w-[320px] mb-stack-lg">
                Access your entire vocabulary library and essential definitions without an internet connection.
            </p>
<!-- Progress Indicator -->
<div class="flex gap-2 mb-stack-lg">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-8 h-2 rounded-full bg-primary-container"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</div>
</main>
<!-- Navigation Actions Footer -->
<footer class="p-container-padding pb-12 z-20">
<div class="max-w-md mx-auto flex items-center justify-between">
<button class="font-button-text text-button-text text-on-surface-variant hover:text-on-surface transition-colors px-6 py-3" onclick="handleSkip()">
                Skip
            </button>
<button class="font-button-text text-button-text bg-secondary text-on-secondary px-10 py-4 rounded-xl shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center gap-2" onclick="handleNext()">
                Next
                <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</div>
</footer>
<!-- Interactive Layer -->
<script>
        function handleSkip() {
            console.log("Onboarding Skipped");
            document.body.style.opacity = '0';
            setTimeout(() => {
                // Logic for navigating to home/dashboard
                alert("Redirecting to Dashboard...");
                document.body.style.opacity = '1';
            }, 500);
        }

        function handleNext() {
            console.log("Next Screen Requested");
            // Basic transition effect for UI simulation
            const main = document.querySelector('main');
            main.style.transform = 'translateX(-20px)';
            main.style.opacity = '0';
            
            setTimeout(() => {
                alert("Proceeding to final onboarding step...");
                main.style.transform = 'translateX(0)';
                main.style.opacity = '1';
            }, 300);
        }
    </script>
</body></html>
