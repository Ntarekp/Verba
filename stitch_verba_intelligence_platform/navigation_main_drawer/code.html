<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-4">
<!-- Backdrop Overlay for context -->
<div class="fixed inset-0 bg-on-background/20 backdrop-blur-sm z-40 pointer-events-none"></div>
<!-- Navigation Drawer Component from JSON -->
<!-- Applying style_shell_layout, style_bg_color, style_component_shape, style_shadows_and_elevation, style_interactions -->
<nav class="fixed left-0 top-0 h-full w-80 z-[60] p-6 flex flex-col gap-stack-lg bg-surface-container/90 backdrop-blur-2xl shadow-2xl rounded-r-3xl border-r border-white/10 transition-all duration-300 ease-in-out transform translate-x-0">
<!-- Header Profile Section -->
<div class="flex flex-col gap-stack-sm w-full pt-4">
<div class="flex items-center gap-4">
<div class="w-16 h-16 rounded-full overflow-hidden bg-surface-variant flex-shrink-0 border-2 border-primary/20">
<img alt="Alex Verba profile picture" class="w-full h-full object-cover" data-alt="A close up, professional portrait of a calm, intelligent person. Soft studio lighting. The aesthetic is clean, modern, and high-quality, fitting a premium language learning application. Light mode color palette with soft background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCWeXx9T_lC7DcLD53qI8Z6KRtCjVEFWh3GkeVhfReiQohrpxtioElLKJIkv_GorKRAC5B4VY2CccdFdEHi79qhISmgmUt0Q9qYrrtKB-KBXMsJ3W6bHmgGB4jwQBQUsrQrGGEA6X5pf-cWkhEHke3jmcoSmQsyLESLFSgjjBMcbSU7SQnJULqm3SpVonTbuIbhatKjC-V1HniZTW0HK6dFUm4DruGpJRSbnvfFQ5Iqtr9jejFXqpcmZSvATV0eKxJvvJtSGS1x8Q"/>
</div>
<div class="flex flex-col">
<h2 class="font-button-text text-button-text text-on-surface font-bold">Alex Verba</h2>
<p class="font-caption text-caption text-primary font-semibold">Intelligence Tier: Scholar</p>
<p class="font-caption text-caption text-on-surface-variant">1,240 words mastered</p>
</div>
</div>
</div>
<!-- Navigation List -->
<!-- Active state mapped to "Saved Words" as default per JSON, using style_active_navigation and style_inactive_navigation -->
<div class="flex flex-col flex-1 overflow-y-auto gap-unit pr-2 -mr-2 scrollbar-hide">
<a class="flex items-center gap-4 px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-variant/50 hover:translate-x-1 transition-transform font-button-text text-button-text group" href="#">
<span class="material-symbols-outlined text-tertiary-container group-hover:text-primary transition-colors">history</span>
<span>Search History</span>
</a>
<!-- Active Item from JSON -->
<a class="flex items-center gap-4 px-4 py-3 rounded-xl bg-primary/10 text-primary font-semibold font-button-text text-button-text hover:translate-x-1 transition-transform group" href="#">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">bookmark</span>
<span>Saved Words</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-variant/50 hover:translate-x-1 transition-transform font-button-text text-button-text group" href="#">
<span class="material-symbols-outlined text-tertiary-container group-hover:text-primary transition-colors">calendar_today</span>
<span>Word Of The Day</span>
</a>
<div class="h-px w-full bg-surface-container-highest my-2"></div>
<a class="flex items-center gap-4 px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-variant/50 hover:translate-x-1 transition-transform font-button-text text-button-text group" href="#">
<span class="material-symbols-outlined text-tertiary-container group-hover:text-primary transition-colors">settings</span>
<span>Settings</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-variant/50 hover:translate-x-1 transition-transform font-button-text text-button-text group" href="#">
<span class="material-symbols-outlined text-tertiary-container group-hover:text-primary transition-colors">info</span>
<span>About</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-variant/50 hover:translate-x-1 transition-transform font-button-text text-button-text group" href="#">
<span class="material-symbols-outlined text-tertiary-container group-hover:text-primary transition-colors">feedback</span>
<span>Feedback</span>
</a>
<a class="flex items-center gap-4 px-4 py-3 rounded-xl text-on-surface-variant hover:bg-surface-variant/50 hover:translate-x-1 transition-transform font-button-text text-button-text group" href="#">
<span class="material-symbols-outlined text-tertiary-container group-hover:text-primary transition-colors">help</span>
<span>Support</span>
</a>
</div>
<!-- Premium Upgrade Card -->
<!-- Based on JSON item "Verba Premium" but designed as a highlighted card at bottom -->
<div class="mt-auto pt-4 border-t border-surface-container-highest">
<div class="bg-gradient-to-br from-primary-container to-secondary-container rounded-2xl p-5 text-on-primary shadow-lg relative overflow-hidden group hover:scale-[1.02] transition-transform cursor-pointer">

</div>
<p class="font-caption text-caption text-primary-fixed-dim mb-4 relative z-10">Unlock advanced etymology, unlimited lists, and offline mode.</p>
<button class="w-full py-2 px-4 bg-white/10 hover:bg-white/20 border border-white/20 rounded-lg font-label-caps text-label-caps text-white transition-colors relative z-10 flex items-center justify-center gap-2">
<span>Upgrade Now</span>
<span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</button>
</div>
</div>
