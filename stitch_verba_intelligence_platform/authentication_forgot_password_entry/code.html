<style>
        body {
            background-color: #f8f9ff;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .soft-glow {
            box-shadow: 0 8px 32px 0 rgba(79, 70, 229, 0.08);
        }
        input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
        }
        /* Custom micro-interactions */
        .btn-hover-effect:active {
            transform: scale(0.98);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="flex items-center justify-center min-h-screen p-container-padding overflow-hidden">
<!-- Atmospheric Background Shader Placeholder -->
<div class="fixed inset-0 -z-10 opacity-30">

</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[440px] z-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Brand Identity Container -->
<header class="flex flex-col items-center mb-stack-lg text-center">
<div class="mb-stack-md">
<h1 class="font-display-word-mobile text-display-word-mobile text-primary tracking-tight">Verba</h1>
</div>
<h2 class="font-section-heading text-section-heading text-on-surface mb-stack-sm">Forgot Password?</h2>
<p class="font-caption text-caption text-on-surface-variant max-w-[320px]">Enter your email address and we'll send you instructions to reset your account access.</p>
</header>
<!-- Form Card -->
<div class="glass-card soft-glow rounded-[24px] p-container-padding">
<form class="space-y-stack-lg" id="reset-form">
<!-- Input Group -->
<div class="space-y-unit">
<label class="font-label-caps text-label-caps text-on-surface-variant block ml-1 uppercase tracking-widest" for="email">
                        Email Address
                    </label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">
                            mail
                        </span>
<input class="w-full h-[56px] pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-xl font-definition-body text-on-surface placeholder:text-outline-variant/60 focus:border-primary transition-all duration-200" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="btn-hover-effect w-full h-[56px] bg-secondary text-on-secondary rounded-xl font-button-text text-button-text shadow-lg shadow-secondary/20 hover:opacity-90 transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">
                        arrow_forward
                    </span>
</button>
</form>
<!-- Secondary Actions -->
<div class="mt-stack-lg pt-stack-md border-t border-white/40 flex justify-center">
<a class="flex items-center gap-2 font-button-text text-button-text text-on-surface-variant hover:text-primary transition-colors group" href="/login">
<span class="material-symbols-outlined text-[18px]">
                        arrow_back
                    </span>
<span>Back to Login</span>
</a>
</div>
</div>
<!-- Visual Anchor (Subtle imagery) -->
<div class="mt-stack-lg opacity-40 grayscale flex justify-center gap-stack-md">
<div class="w-1.5 h-1.5 rounded-full bg-primary/40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/40"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/40"></div>
</div>
</main>
<!-- Contextual Decorative Imagery (Optional for Premium Feel) -->
<div class="fixed top-12 left-12 w-64 h-64 -z-20 opacity-10 blur-3xl rounded-full bg-primary pointer-events-none"></div>
<div class="fixed bottom-12 right-12 w-96 h-96 -z-20 opacity-10 blur-3xl rounded-full bg-tertiary-container pointer-events-none"></div>
<script>
        document.getElementById('reset-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            // Simulation of loading state defined in style guidance
            btn.innerHTML = `
                <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            `;
            btn.classList.add('pointer-events-none', 'opacity-80');

            setTimeout(() => {
                // Return to success state or redirect
                btn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Link Sent</span>
                `;
                btn.classList.remove('bg-secondary');
                btn.classList.add('bg-primary');
            }, 1800);
        });
    </script>
</body></html>
