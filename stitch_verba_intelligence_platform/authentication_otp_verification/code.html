<body class="bg-background text-on-background min-h-screen font-sans selection:bg-primary/20 selection:text-primary overflow-x-hidden">
<!-- Hero Decorative Shader Background -->
<div class="fixed inset-0 -z-10 pointer-events-none opacity-40">

</div>
<!-- Header (Suppressed Navigation Shell as per task: transactional screen) -->
<header class="fixed top-0 left-0 w-full px-container-padding py-stack-md flex items-center justify-between z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary font-bold">menu_book</span>

</div>
<button class="p-2 rounded-full hover:bg-surface-container transition-colors group" onclick="window.history.back()">

</button>
</header>
<main class="flex flex-col items-center justify-center min-h-screen px-container-padding py-stack-lg">
<!-- Verification Card -->

<h1 class="font-section-heading text-section-heading-mobile md:text-section-heading text-on-surface mb-2">Verification Code</h1>

                </p>
</div>
<!-- OTP Input Grid -->
<form class="space-y-8" id="otp-form">
<div class="flex justify-between gap-2 md:gap-3" id="otp-container">
<input autofocus="" class="otp-input w-full aspect-square text-center font-display-word-mobile text-primary bg-surface-container-lowest border-outline-variant/30 border-2 rounded-2xl transition-all outline-none" maxlength="1" type="text"/>
<input class="otp-input w-full aspect-square text-center font-display-word-mobile text-primary bg-surface-container-lowest border-outline-variant/30 border-2 rounded-2xl transition-all outline-none" maxlength="1" type="text"/>
<input class="otp-input w-full aspect-square text-center font-display-word-mobile text-primary bg-surface-container-lowest border-outline-variant/30 border-2 rounded-2xl transition-all outline-none" maxlength="1" type="text"/>
<input class="otp-input w-full aspect-square text-center font-display-word-mobile text-primary bg-surface-container-lowest border-outline-variant/30 border-2 rounded-2xl transition-all outline-none" maxlength="1" type="text"/>
<input class="otp-input w-full aspect-square text-center font-display-word-mobile text-primary bg-surface-container-lowest border-outline-variant/30 border-2 rounded-2xl transition-all outline-none" maxlength="1" type="text"/>
<input class="otp-input w-full aspect-square text-center font-display-word-mobile text-primary bg-surface-container-lowest border-outline-variant/30 border-2 rounded-2xl transition-all outline-none" maxlength="1" type="text"/>
</div>

<span class="material-symbols-outlined text-sm">schedule</span>
                        Resend code in <span class="text-primary font-bold" id="countdown">02:00</span>
</div>
<button class="font-button-text text-on-surface-variant/40 hover:text-primary transition-colors disabled:cursor-not-allowed" disabled="" id="resend-btn" type="button">
                        Resend Code
                    </button>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-secondary text-on-secondary font-button-text rounded-2xl shadow-lg shadow-secondary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Verify Identity
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>

<!-- Support Footer -->

                    Having trouble? <a class="text-primary font-medium hover:underline" href="#">Contact linguistics support</a>
</p>

</div>

<script>
        // OTP Auto-focus Logic
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        // Timer Logic
        let timeLeft = 120;
        const countdownEl = document.getElementById('countdown');
        const resendBtn = document.getElementById('resend-btn');

        const timer = setInterval(() => {
            if (timeLeft <= 0) {
                clearInterval(timer);
                resendBtn.disabled = false;
                resendBtn.classList.remove('text-on-surface-variant/40');
                resendBtn.classList.add('text-primary');
                document.getElementById('timer-display').classList.add('opacity-0');
            } else {
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                countdownEl.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                timeLeft--;
            }
        }, 1000);

        // Form Submission Interaction
        document.getElementById('otp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>`;
            setTimeout(() => {
                btn.innerHTML = 'Identity Verified';
                btn.classList.replace('bg-secondary', 'bg-tertiary-container');
            }, 1500);
        });
    </script>
