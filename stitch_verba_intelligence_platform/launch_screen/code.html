<style>
        .material-symbols-outlined {

        .animate-fade-in {

        }

        .animate-slide-up {
            animation: slideUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }

<div class="fixed inset-0 pointer-events-none opacity-[0.03] z-50 bg-[url('https://grainy-gradients.vercel.app/noise.svg')]"></div>
<script>
        function simulateEntry() {
            const body = document.body;
            body.style.transition = 'opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1)';
            body.style.opacity = '0';
            
            setTimeout(() => {
                // In a real app, this would route to the Search/Home screen
                console.log("Navigating to intelligence workspace...");
                // Resetting for visual demonstration
                setTimeout(() => { body.style.opacity = '1'; }, 500);
            }, 800);
        }

        // Mouse parallax for subtle atmospheric movement
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.fixed.inset-0.z-0 div');
            const x = (e.clientX - window.innerWidth / 2) / 50;
            const y = (e.clientY - window.innerHeight / 2) / 50;
            
            blobs.forEach((blob, index) => {
                const speed = (index + 1) * 0.5;
                blob.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
