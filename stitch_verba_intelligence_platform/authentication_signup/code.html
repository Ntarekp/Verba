<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .soft-glow {
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.08);
        }
        .input-glow:focus-within {
            box-shadow: 0 0 0 4px rgba(53, 37, 205, 0.1);
        }
        body {
            background: radial-gradient(circle at top left, #f8f9ff 0%, #e2dfff 40%, #f8f9ff 100%);
            min-height: 100vh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-definition-body text-on-surface antialiased overflow-x-hidden">
<!-- Top App Bar (Simplified for Signup) -->
<header class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-container-padding py-stack-sm">
<div class="flex items-center gap-2">
<span class="font-display-word-mobile text-display-word-mobile tracking-tighter text-primary">Verba</span>
</div>
<a class="text-primary font-button-text text-button-text flex items-center gap-1 hover:opacity-80 transition-opacity" href="#">
<span class="material-symbols-outlined text-[20px]">help</span>
            Support
        </a>
</header>
<main class="pt-[100px] pb-stack-lg px-container-padding flex flex-col items-center justify-center min-h-screen max-w-lg mx-auto">
<!-- Welcome Section -->
<div class="w-full mb-stack-lg text-center">
<h1 class="font-section-heading text-section-heading-mobile text-on-surface mb-2">Create your account</h1>
<p class="font-caption text-caption text-on-surface-variant">Join our community of linguistic enthusiasts.</p>
</div>
<!-- Signup Card -->
<div class="w-full glass-panel rounded-[32px] p-8 soft-glow">
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4 mb-stack-lg">
<button class="flex items-center justify-center gap-3 py-3 px-4 rounded-xl border border-outline-variant bg-white hover:bg-surface-container transition-colors active:scale-95 duration-200">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-button-text text-button-text text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 rounded-xl border border-outline-variant bg-white hover:bg-surface-container transition-colors active:scale-95 duration-200">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.78-3.12 1.72-1.07-.06-1.45-.71-2.72-.71-1.27 0-1.7.67-2.72.76-1.02.09-2.12-.86-3.15-1.77-2.08-1.85-3.66-5.2-3.66-8.38 0-3.18 1.61-4.88 3.12-4.88 1.51 0 2.41.93 3.33.93.92 0 2-.99 3.66-.99 1.41 0 2.51.72 3.19 1.7-2.92 1.63-2.45 5.38.5 6.63-.61 1.54-1.57 3.03-2.43 3.99zM12.03 5.41c-.08-2.02 1.63-3.7 3.51-3.71.21 2.22-2.11 3.99-3.51 3.71z"></path>
</svg>
<span class="font-button-text text-button-text text-on-surface">Apple</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 mb-stack-lg">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-caps text-label-caps text-on-surface-variant/60 uppercase">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface ml-1">Full Name</label>
<div class="relative input-glow rounded-xl overflow-hidden transition-all">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-white/50 border border-outline-variant/50 focus:border-primary focus:ring-0 text-on-surface placeholder:text-on-surface-variant/30 font-definition-body text-[16px] outline-none rounded-xl" placeholder="Alex Verba" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface ml-1">Email Address</label>
<div class="relative input-glow rounded-xl overflow-hidden transition-all">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-white/50 border border-outline-variant/50 focus:border-primary focus:ring-0 text-on-surface placeholder:text-on-surface-variant/30 font-definition-body text-[16px] outline-none rounded-xl" placeholder="alex@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface ml-1">Password</label>
<div class="relative input-glow rounded-xl overflow-hidden transition-all">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-white/50 border border-outline-variant/50 focus:border-primary focus:ring-0 text-on-surface placeholder:text-on-surface-variant/30 font-definition-body text-[16px] outline-none rounded-xl" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full py-4 bg-primary-container text-white font-button-text text-button-text rounded-2xl soft-glow hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Create Account
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<p class="mt-8 text-center font-caption text-caption text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
<!-- Terms Footer -->
<p class="mt-stack-lg text-center font-label-caps text-[10px] leading-relaxed text-on-surface-variant/40 max-w-xs uppercase tracking-[0.1em]">
            By signing up, you agree to our Terms of Service and Privacy Policy.
        </p>
</main>
<!-- Visual Accent Elements -->
<div class="fixed -bottom-32 -left-32 w-96 h-96 bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed -top-32 -right-32 w-96 h-96 bg-secondary/5 rounded-full blur-[120px] -z-10"></div>
<script>
        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('bg-white');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('bg-white');
            });
        });

        // Simple button scale interaction
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => btn.classList.add('scale-95'));
            btn.addEventListener('mouseup', () => btn.classList.remove('scale-95'));
            btn.addEventListener('mouseleave', () => btn.classList.remove('scale-95'));
        });
    </script>
</body></html>
