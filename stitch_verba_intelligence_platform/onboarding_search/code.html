<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verba - Instant Word Search</title>

                        "on-error": "#ffffff",

                        "secondary-container": "#2170e4",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(79, 70, 229, 0.08);
        }
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .pulse-soft {
            animation: pulse-soft 3s infinite ease-in-out;
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .floating {
            animation: floating 4s infinite ease-in-out;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-definition-body text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- Header Navigation (Hidden in Onboarding per instructions, but placeholder for structure if needed) -->
<!-- Content starts here -->
<main class="flex-1 relative flex flex-col items-center justify-between py-stack-lg px-container-padding max-w-md mx-auto w-full">
<!-- Top Branding / Skip Button -->
<div class="w-full flex justify-between items-center">
<span class="font-display-word-mobile text-primary text-[24px] tracking-tighter font-bold">Verba</span>
<button class="text-on-surface-variant/60 font-button-text text-caption hover:text-primary transition-colors">Skip</button>
</div>
<!-- Illustration Canvas (Bento/Asymmetric Layout) -->
<div class="relative w-full h-80 flex items-center justify-center my-stack-lg">
<!-- Background Decorative Element -->
<div class="absolute inset-0 bg-gradient-to-br from-primary-container/10 to-tertiary-container/5 rounded-[40px] blur-3xl -z-10"></div>
<!-- Main Glassmorphic Search UI Component -->
<div class="relative w-full max-w-[280px] floating">
<!-- Search Bar Placeholder -->
<div class="glass-card rounded-2xl p-stack-md flex items-center gap-3 mb-stack-md">
<span class="material-symbols-outlined text-secondary">search</span>
<div class="flex-1 h-4 bg-on-surface-variant/10 rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full w-1/3 bg-primary rounded-full"></div>
<div class="shimmer absolute inset-0"></div>
</div>
</div>
<!-- Result Card -->
<div class="glass-card rounded-[24px] p-stack-md border-primary/10 transform translate-x-4">
<div class="flex justify-between items-start mb-2">
<div>
<span class="text-label-caps font-label-caps text-secondary uppercase tracking-widest">Noun</span>
<h3 class="text-section-heading font-section-heading text-on-surface leading-none mt-1">Luminescence</h3>
</div>
<div class="w-8 h-8 rounded-full bg-tertiary-fixed-dim/30 flex items-center justify-center text-tertiary pulse-soft">
<span class="material-symbols-outlined text-[18px]">volume_up</span>
</div>
</div>
<div class="w-full h-[2px] bg-primary/20 mb-stack-md"></div>
<p class="text-caption text-on-surface-variant/80 leading-relaxed italic">
                        "The spontaneous emission of light by a substance not resulting from heat."
                    </p>
<!-- Context Chip -->
<div class="mt-stack-md flex gap-2">
<div class="px-3 py-1 rounded-full border border-secondary/20 bg-secondary/5 text-[10px] font-label-caps text-secondary">SCIENTIFIC</div>
<div class="px-3 py-1 rounded-full border border-tertiary/20 bg-tertiary/5 text-[10px] font-label-caps text-tertiary">LATIN ROOT</div>
</div>
</div>
<!-- Fast Indicator -->
<div class="absolute -bottom-4 -left-6 glass-card px-4 py-2 rounded-xl flex items-center gap-2 border-secondary/20 shadow-lg scale-90">
<span class="material-symbols-outlined text-secondary text-[20px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="text-label-caps font-label-caps text-on-surface">12ms Response</span>
</div>
</div>
</div>
<!-- Text Content Area -->
<div class="w-full text-center space-y-stack-md">
<h1 class="text-section-heading font-section-heading text-on-surface">Instant Intelligence</h1>
<p class="text-definition-body font-definition-body text-on-surface-variant max-w-[320px] mx-auto opacity-90">
                Search millions of words with lightning speed and deep contextual AI.
            </p>
</div>
<!-- Pagination and Controls -->
<div class="w-full space-y-stack-lg pt-stack-lg">
<!-- Progress Dots -->
<div class="flex justify-center gap-2">
<div class="w-8 h-2 rounded-full bg-primary transition-all"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant hover:bg-primary/40 cursor-pointer"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant hover:bg-primary/40 cursor-pointer"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant hover:bg-primary/40 cursor-pointer"></div>
</div>
<!-- Primary Action -->
<button class="w-full bg-secondary text-on-secondary py-4 rounded-2xl font-button-text text-button-text flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-md">
                Next
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Visual Polish: Atmosphere Particles -->
<div class="fixed inset-0 pointer-events-none -z-20 overflow-hidden">
<div class="absolute top-1/4 -right-10 w-64 h-64 bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 -left-10 w-64 h-64 bg-tertiary/5 rounded-full blur-[100px]"></div>
</div>
<script>
        // Simple micro-interaction for the result card entry
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-card.transform');
            if(card) {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px) translateX(16px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0) translateX(16px)';
                }, 300);
            }
        });
    </script>
</body></html>
