<span class="relative z-10 material-symbols-outlined text-white transition-transform group-hover:translate-x-1" style="font-variation-settings: 'wght' 500;">arrow_forward</span>
<!-- Hover Glow Effect -->

<script>
        // Micro-interactions
        function handleSignIn() {
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;
            
            // Loading State Simulation
            btn.innerHTML = `
                <div class="flex items-center gap-3">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="font-button-text text-button-text">Redirecting...</span>
                </div>
            `;
            btn.classList.add('pointer-events-none');
            
            // Mock redirect delay
            setTimeout(() => {
                console.log('Redirecting to login...');
                // Reset for demo purposes
                btn.innerHTML = originalContent;
                btn.classList.remove('pointer-events-none');
            }, 1500);
        }

        // Parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const moveX = (x - 0.5) * 20;
            const moveY = (y - 0.5) * 20;
            
            const card = document.querySelector('.glass-card');
            card.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
