<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            font-variation-settings: 'FILL' 1;
        }
        
        /* Calm Shimmer Animation for Skeletons */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton-shimmer {
            background-color: #cbdbf5; /* surface-dim */
            background-image: linear-gradient(
                90deg, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(248, 249, 255, 0.6) 50%, /* surface-bright */
                rgba(255, 255, 255, 0) 100%
            );
            background-size: 200% 100%;
            background-repeat: no-repeat;
            animation: shimmer 1.5s infinite ease-in-out;
            border-radius: 0.5rem; /* lg */
        }

        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(248, 249, 255, 0.8); /* surface */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(79, 70, 229, 0.04);
        }

        /* Smooth fade transition for states */
        .fade-transition {
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }
        .hidden-state {
            opacity: 0;
            pointer-events: none;
            position: absolute;
            transform: translateY(10px);
            visibility: hidden;
        }
        .active-state {
            opacity: 1;
            pointer-events: auto;
            position: relative;
            transform: translateY(0);
            visibility: visible;
        }
    </style>
<style>

<body class="bg-background text-on-background antialiased min-h-screen flex flex-col font-definition-body">

<!-- Main Canvas -->

<!-- Header Skeleton -->
<div class="flex justify-between items-start pt-4">
<div class="space-y-unit w-3/4">

<div class="skeleton-shimmer h-12 w-full max-w-[280px] rounded-xl"></div>

<div class="skeleton-shimmer h-6 w-32 rounded-md mt-2"></div>
</div>
<!-- Audio Button -->

</div>
<!-- Definition Blocks Skeletons -->
<div class="space-y-stack-lg mt-stack-lg">
<!-- Block 1 -->
<div class="relative pl-4 border-l-2 border-surface-variant space-y-stack-md">

<div class="skeleton-shimmer h-6 w-20 rounded-full"></div>
<!-- Definition lines -->

<div class="skeleton-shimmer h-5 w-full"></div>
<div class="skeleton-shimmer h-5 w-11/12"></div>
<div class="skeleton-shimmer h-5 w-4/5"></div>

</div>
<!-- Block 2 -->

<div class="space-y-3">

<!-- Block 3 -->

<!-- Interactive Logic for Demonstration -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const stateLoading = document.getElementById('state-loading');
            const stateError = document.getElementById('state-error');
            const btnRetry = document.getElementById('btn-retry');
            
            let simTimeout;

            const showError = () => {
                stateLoading.classList.remove('active-state');
                stateLoading.classList.add('hidden-state');
                
                // Small delay to allow fade out before fade in
                setTimeout(() => {
                    stateError.classList.remove('hidden-state');
                    stateError.classList.add('active-state');
                }, 400);
            };

            const showLoading = () => {
                stateError.classList.remove('active-state');
                stateError.classList.add('hidden-state');
                
                setTimeout(() => {
                    stateLoading.classList.remove('hidden-state');
                    stateLoading.classList.add('active-state');
                    
                    // Restart the simulation
                    simTimeout = setTimeout(showError, 3500);
                }, 400);
            };

            // Initial simulation: Load for 3.5 seconds, then show error
            simTimeout = setTimeout(showError, 3500);

            // Retry button resets the flow
            btnRetry.addEventListener('click', () => {
                clearTimeout(simTimeout);
                // Add a small loading spinner to button temporarily
                const originalText = btnRetry.innerHTML;
                btnRetry.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Searching...`;
                btnRetry.classList.add('opacity-80', 'pointer-events-none');
                
                setTimeout(() => {
                    btnRetry.innerHTML = originalText;
                    btnRetry.classList.remove('opacity-80', 'pointer-events-none');
                    showLoading();
                }, 600);
            });
        });
    </script>
