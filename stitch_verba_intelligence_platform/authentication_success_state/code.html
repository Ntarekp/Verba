<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Success | Verba</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#eff4ff",
                        "surface-container-high": "#dce9ff",
                        "tertiary-fixed-dim": "#4cd7f6",
                        "on-error": "#ffffff",
                        "tertiary": "#00505f",
                        "on-tertiary-container": "#93e8ff",
                        "tertiary-container": "#006a7c",
                        "primary-fixed": "#e2dfff",
                        "inverse-primary": "#c3c0ff",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-surface": "#0b1c30",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-fixed": "#001a42",
                        "surface-container": "#e5eeff",
                        "background": "#f8f9ff",
                        "secondary-container": "#2170e4",
                        "error": "#ba1a1a",
                        "inverse-surface": "#213145",
                        "on-tertiary-fixed": "#001f26",
                        "on-surface-variant": "#464555",
                        "tertiary-fixed": "#acedff",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed": "#d8e2ff",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#c3c0ff",
                        "on-tertiary-fixed-variant": "#004e5c",
                        "on-secondary-fixed-variant": "#004395",
                        "surface-container-lowest": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "outline": "#777587",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eaf1ff",
                        "surface": "#f8f9ff",
                        "on-secondary-container": "#fefcff",
                        "primary-container": "#4f46e5",
                        "on-primary-container": "#dad7ff",
                        "on-error-container": "#93000a",
                        "primary": "#3525cd",
                        "on-primary-fixed": "#0f0069",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#d3e4fe",
                        "surface-variant": "#d3e4fe",
                        "surface-tint": "#4d44e3",
                        "on-primary-fixed-variant": "#3323cc",
                        "secondary": "#0058be",
                        "outline-variant": "#c7c4d8",
                        "on-background": "#0b1c30"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "unit": "8px",
                        "gutter": "16px",
                        "container-padding": "24px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "display-word-mobile": ["Inter"],
                        "caption": ["Inter"],
                        "label-caps": ["Inter"],
                        "definition-body": ["Inter"],
                        "display-word": ["Inter"],
                        "button-text": ["Inter"],
                        "section-heading": ["Inter"]
                    },
                    "fontSize": {
                        "display-word-mobile": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "caption": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "definition-body": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],

                        "button-text": ["16px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "section-heading": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #f8f9ff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(79, 70, 229, 0.08);
        }
        .checkmark-morph {
            animation: morph 2s ease-in-out infinite;
        }
        @keyframes morph {
            0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
        }
        .floating {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center min-h-screen p-container-padding">
<!-- Subtle Background Atmosphere -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Main Success Container -->
<main class="relative z-10 w-full max-w-md">
<div class="glass-panel p-stack-lg rounded-[32px] flex flex-col items-center text-center space-y-stack-lg transition-all duration-500 scale-100 opacity-100">
<!-- Abstract Success Illustration -->
<div class="relative w-32 h-32 flex items-center justify-center">
<!-- Morphing Background -->
<div class="checkmark-morph absolute inset-0 bg-gradient-to-tr from-secondary/20 to-tertiary-fixed/30 blur-sm"></div>
<!-- Glass Circle -->
<div class="relative w-24 h-24 rounded-full glass-panel flex items-center justify-center shadow-inner border-white/40">
<span class="material-symbols-outlined text-secondary text-5xl font-bold leading-none select-none" style="font-variation-settings: 'FILL' 1, 'wght' 600;">
                        check_circle
                    </span>
</div>
<!-- Floating Accents -->
<div class="floating absolute -top-2 -right-2 w-4 h-4 rounded-full bg-tertiary-fixed-dim/40 backdrop-blur-sm"></div>
<div class="floating absolute -bottom-4 -left-2 w-6 h-6 rounded-full bg-secondary-fixed/30 backdrop-blur-sm" style="animation-delay: 1s;"></div>
</div>
<!-- Content Section -->
<div class="space-y-stack-sm">
<h1 class="font-section-heading text-section-heading-mobile text-on-surface tracking-tight">
                    Account Created
                </h1>
<p class="font-definition-body text-on-surface-variant max-w-[280px] mx-auto opacity-80">
                    Welcome to the future of linguistics. Your journey with Verba begins now.
                </p>
</div>
<!-- Action Section -->
<div class="w-full pt-stack-md">
<button class="group relative w-full py-4 px-8 bg-secondary text-on-secondary font-button-text text-button-text rounded-2xl shadow-lg hover:shadow-secondary/20 transition-all duration-200 active:scale-95 flex items-center justify-center gap-2 overflow-hidden" onclick="this.classList.add('scale-95'); setTimeout(() =&gt; window.location.reload(), 200);">
<span class="relative z-10">Continue to Verba</span>
<span class="material-symbols-outlined relative z-10 text-xl group-hover:translate-x-1 transition-transform">
                        arrow_forward
                    </span>
<!-- Button Hover Glow -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"></div>
</button>
<p class="mt-stack-lg font-caption text-on-surface-variant/60">
                    Redirecting in <span class="font-medium text-secondary" id="countdown">5</span>s...
                </p>
</div>
</div>
<!-- Supportive Micro-Copy -->
<footer class="mt-stack-lg text-center">
<div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-surface-container-low/50 border border-white/20">
<span class="w-1.5 h-1.5 rounded-full bg-tertiary shadow-[0_0_8px_rgba(0,80,95,0.4)]"></span>
<span class="font-label-caps text-label-caps text-on-surface-variant/80">Encrypted &amp; Secure</span>
</div>
</footer>
</main>
<script>
        // Micro-interaction: Countdown Timer
        let count = 5;
        const countdownElement = document.getElementById('countdown');
        const timer = setInterval(() => {
            count--;
            countdownElement.textContent = count;
            if (count === 0) {
                clearInterval(timer);
                // In a real app, redirection logic would go here
                console.log('Redirecting...');
            }
        }, 1000);

        // Micro-interaction: Entrance Animation
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('main');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                container.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
